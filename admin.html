<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body style="font-family:sans-serif; text-align:center;">

<h2>📊 Admin Panel - Add Student Result</h2>

<input id="roll" placeholder="Roll No"><br><br>
<input id="name" placeholder="Name"><br><br>
<input id="class" placeholder="Class"><br><br>

<h3>Subjects</h3>
<input id="quran" placeholder="Quran"><br><br>
<input id="arabic" placeholder="Arabic"><br><br>
<input id="english" placeholder="English"><br><br>
<input id="malayalam" placeholder="Malayalam"><br><br>

<input id="ajar" placeholder="Total Ajar"><br><br>
<input id="examDate" placeholder="Exam Date"><br><br>
<input id="rank" placeholder="Rank"><br><br>

<button onclick="addResult()">➕ Add Result</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// 🔥 Firebase config (YOUR OWN DETAILS ADD ചെയ്യുക)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addResult(){

  let subjects = {
    Quran: Number(quran.value),
    Arabic: Number(arabic.value),
    English: Number(english.value),
    Malayalam: Number(malayalam.value)
  };

  // 🧮 Auto calculation
  let marks = Object.values(subjects);
  let total = marks.reduce((a,b)=>a+b,0);
  let percentage = (total / (marks.length * 100)) * 100;

  let data = {
    roll: roll.value,
    name: name.value,
    class: class.value,
    subjects: subjects,
    total: total,
    percentage: percentage.toFixed(2) + "%",
    ajar: ajar.value,
    examDate: examDate.value,
    rank: rank.value
  };

  db.collection("results").doc(data.roll).set(data);

  alert("✅ Result Added Successfully!");
}
</script>

</body>
</html>
