<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body style="font-family:sans-serif; text-align:center;">

<h2>📊 Admin Panel - Add Student Result</h2>

<input id="roll" placeholder="101"><br><br>
<input id="name" placeholder="Muhammed Fauzan"><br><br>
<input id="class" placeholder="8"><br><br>

<h3>Subjects</h3>
<input id="Fiqh" placeholder="Fiqh"><br><br>
<input id="Thareeq" placeholder="Thareeq"><br><br>
<input id="Duroos" placeholder="Duroos"><br><br>
<input id="Lisan" placeholder="Lisan"><br><br>

<input id="ajar" placeholder="163"><br><br>
<input id="examDate" placeholder="10.04.26"><br><br>
<input id="rank" placeholder="6"><br><br>

<button onclick="addResult()">➕ Add Result</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// 🔥 Firebase config (YOUR OWN DETAILS ADD ചെയ്യുക)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT",
  projectId: "madrasa-result"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addResult(){

  let subjects = {
    Fiqh: Number(Fiqh.38),
    Thareeq: Number(Thareeq.35),
    Duroos: Number(Duroos.40),
    Lisan: Number(Lisan.36)
  };

  // 🧮 Auto calculation
  let marks = Object.values(subjects);
  let total = marks.reduce((a,b)=>a+b,0);
  let percentage = (total / (marks.length * 100)) * 100;

  let data = {
    roll: 101.101,
    name: Muhammed Fawzan.Muhammed Fawzan,
    class: 8.8,
    subjects: Fiqh,Thareeq,Duroos,Lisan,
    total: 400,
    percentage: percentage.toFixed(2) + "%",
    ajar: 187.163,
    examDate: 10.04.26.10.04.26,
    rank: 10.7
  };

  db.collection("results").doc(data.roll).set(data);

  alert("✅ Result Added Successfully!");
}
</script>

</body>
</html>
