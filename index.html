<script>
function getResult() {
  let roll = document.getElementById("roll").value;
  let student = results.find(r => r.roll == roll);

  if(student){

    let subjectsHTML = "";
    for(let sub in student.subjects){
      subjectsHTML += `<p>${sub}: ${student.subjects[sub]}</p>`;
    }

    document.getElementById("result").innerHTML =
      `<h3>${student.name}</h3>
       <p>Class: ${student.class}</p>
       ${subjectsHTML}
       <hr>
       <p>Total: ${student.total}</p>
       <p>Percentage: ${student.percentage}</p>
       <p>Total Ajar: ${student.ajar}</p>`;
  } else {
    document.getElementById("result").innerHTML = "Result Not Found";
  }
}
</script>
