<div id="result"></div>

<script>
function getResult() {
  let roll = document.getElementById("roll").value;
  let student = results.find(r => r.roll == roll);

  if(student){

    let subjects = "";
    for(let sub in student.subjects){
      subjects += `
        <tr>
          <td>${sub}</td>
          <td>${student.subjects[sub]}</td>
        </tr>`;
    }

    document.getElementById("result").innerHTML =
    `
    <div class="marksheet">

      <div class="header">
        <img src="logo.png" class="logo">
        <div>
          <h2>Darul Huda Madrasa</h2>
          <p>Result Marksheet</p>
        </div>
        <img src="seal.png" class="seal">
      </div>

      <hr>

      <<p><b>Name:</b> ${student.name}</p>
      <p><b>Roll No:</b> ${student.roll}</p>
      <p><b>Class:</b> ${student.class}</p>
      <p><b>📅 Exam Date:</b> ${student.examDate}</p>
      <p><b>📌 Rank:</b> ${student.rank}</p>
     
      <table>
        <tr>
          <th>Subject</th>
          <th>Mark</th>
        </tr>
        ${subjects}
      </table>

      <h3>Total: ${student.total}</h3>
      <h3>Percentage: ${student.percentage}</h3>
      <h3>Total Ajar: ${student.ajar}</h3>

      <div class="footer">
        <p>Signature</p>
        <p>Seal</p>
      </div>

    </div>
    `;
  } else {
    document.getElementById("result").innerHTML = "Result Not Found";
  }
}
</script>
